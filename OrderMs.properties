server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:mysql://localhost:3306/practice_db
spring.datasource.username=root
spring.datasource.password=@mydb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.application.name=order-service-with-kafka

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.ecom.dto.OrderDto
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer



# Activate actuators
management.endpoints.web.exposure.include=*
management.endpoint.health.access=unrestricted
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always

# Enable health indicator for this circuit breaker instance
resilience4j.circuitbreaker.instances.OrderMs.registerHealthIndicator=true
# Percentage of failed calls that will open the circuit
resilience4j.circuitbreaker.instances.OrderMs.failureRateThreshold=50
# Percentage of slow calls that will open the circuit
resilience4j.circuitbreaker.instances.OrderMs.slowCallRateThreshold=50
# Number of calls to evaluate for failure rate
resilience4j.circuitbreaker.instances.OrderMs.slidingWindowSize=10
# Use request-count-based sliding window (not time-based)
resilience4j.circuitbreaker.instances.OrderMs.slidingWindowType=COUNT_BASED
# Time the circuit stays OPEN before moving to HALF_OPEN
resilience4j.circuitbreaker.instances.OrderMs.waitDurationInOpenState=10s
# Minimum number of calls before circuit breaker calculates failure rate
resilience4j.circuitbreaker.instances.OrderMs.minimumNumberOfCalls=5
# Treat calls taking longer than this as slow (considered failures)
resilience4j.circuitbreaker.instances.OrderMs.slowCallDurationThreshold=2s
# Number of trial calls allowed when circuit is HALF_OPEN
resilience4j.circuitbreaker.instances.OrderMs.permittedNumberOfCallsInHalfOpenState=3
# Automatically move from OPEN → HALF_OPEN after wait time
resilience4j.circuitbreaker.instances.OrderMs.automaticTransitionFromOpenToHalfOpenEnabled=true

