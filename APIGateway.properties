server.port=9091
eureka.client.service-url.default-zone=http://localhost:8761/eureka


spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://localhost:8084
spring.cloud.gateway.routes[0].predicates[0]=Path=/product-api/**

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/order-api/**

spring.cloud.gateway.routes[1].filters[0]=RequestRateLimiter=redis-rate-limiter.replenishRate=5,redis-rate-limiter.burstCapacity=10,key-resolver=#{@ipKeyResolver}
spring.data.redis.host=localhost
spring.data.redis.port=6379

