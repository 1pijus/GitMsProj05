server.port=9091

eureka.client.service-url.default-zone=http://localhost:8761/eureka

# PRODUCT SERVICE
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=http://localhost:8084
spring.cloud.gateway.routes[0].predicates[0]=Path=/product-api/**

# ORDER SERVICE
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/order-api/**


# GLOBAL RATE LIMITER (APPLIES TO ALL ROUTES)
spring.cloud.gateway.default-filters[0].name=RequestRateLimiter
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.replenishRate=5
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.burstCapacity=10
spring.cloud.gateway.default-filters[0].args.key-resolver=#{@ipKeyResolver}

# REDIS CONFIG
spring.data.redis.host=localhost
spring.data.redis.port=6379
